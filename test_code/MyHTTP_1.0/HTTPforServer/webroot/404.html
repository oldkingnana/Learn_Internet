<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        img {
            width: 300px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 64px;
            margin: 0;
        }

        p {
            font-size: 20px;
            color: #aaa;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #ff6b81;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/404_logo.png" alt="404 Logo">
        <h1>404</h1>
        <p>The page you requested was not found.</p>
        <a href="/">Go Back Home</a>
    </div>
</body>
</html>
