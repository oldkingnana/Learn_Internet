<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - MyTech Blog</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; }
        .box { width:300px; margin:100px auto; background:white; padding:30px; border-radius:5px; }
        input { width:100%; padding:10px; margin:10px 0; }
        button { width:100%; padding:10px; background:#333; color:white; border:none; }
        a { display:block; text-align:center; margin-top:10px; text-decoration:none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Register</h2>
    <form>
        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="submit">Register</button>
    </form>
    <a href="/index.html">Back to Home</a>
</div>

</body>
</html>
